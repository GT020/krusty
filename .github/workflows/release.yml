name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Release Tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Krusty ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Build
        run: cargo build --release

      - name: Create Flatpak Bundle
        run: |
          flatpak-builder --user --force-clean build-dir flatpak/dev.krusty.Krusty.yml
          flatpak build-bundle ~/.local/share/flatpak/repo build-dir krusty-${{ github.ref_name }}-amd64.flatpak

      - name: Upload Flatpak
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const filePath = path.join(process.cwd(), 'krusty-${{ github.ref_name }}-amd64.flatpak');
            
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.build-release.outputs.id }},
              name: 'krusty-${{ github.ref_name }}-amd64.flatpak',
              data: fs.readFileSync(filePath)
            });

  build-dmg:
    runs-on: macos-14
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Create App Bundle
        run: |
          mkdir -p Krusty.app/Contents/MacOS
          cp target/release/krusty Krusty.app/Contents/MacOS/
          
          mkdir -p Krusty.app/Contents/Resources
          cat > Krusty.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>krusty</string>
              <key>CFBundleIdentifier</key>
              <string>dev.krusty.Krusty</string>
              <key>CFBundleName</key>
              <string>Krusty</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Krusty" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --app-drop-link 425 178 \
            Krusty.app/ "Krusty-${{ github.ref_name }}-arm64.dmg"

      - name: Upload DMG
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const filePath = path.join(process.cwd(), 'Krusty-${{ github.ref_name }}-arm64.dmg');
            
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.build-release.outputs.id }},
              name: 'krusty-${{ github.ref_name }}-arm64.dmg',
              data: fs.readFileSync(filePath)
            });
