app-id: dev.krusty.Krusty

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm18

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin:/usr/bin
  prepend-ld-library-path: /usr/lib/x86_64-linux-gnu:/usr/lib/sdk/rust-stable/lib
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/krusty/cargo
    CARGO_TARGET_DIR: /run/build/krusty/target
    CARGO_PROFILE_RELEASE_LTO: "true"
    CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
    CARGO_PROFILE_RELEASE_STRIP: "true"

modules:
  - name: krusty

    buildsystem: simple

    build-commands:
      - flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - cargo fetch
      - cargo build --release --features web
      - install -Dm755 target/release/krusty /app/bin/krusty

    sources:
      - type: dir
        path: ..

command: krusty

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
