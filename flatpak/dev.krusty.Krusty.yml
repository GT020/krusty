app-id: dev.krusty.Krusty
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: krusty
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: krusty
    buildsystem: simple
    build-commands:
      - install -Dm755 krusty /app/bin/krusty
    sources:
      - type: file
        path: target/release/krusty
